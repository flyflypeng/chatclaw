<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MicroClaw Sidebar</title>
  <link rel="stylesheet" href="sidebar.css">
</head>

<body>
  <div class="mc-shell">
    <header class="mc-topbar">
      <div class="mc-brand" role="banner">
        <img class="mc-brand-icon" src="icons/chatclaw-icon.png" alt="ChatClaw" width="24" height="24" />
        <div class="mc-brand-text">
          <div class="mc-brand-title">ChatClaw</div>
        </div>
      </div>
      <div class="mc-topbar-actions">
        <div id="connection-status" class="mc-status-dot disconnected" title="连接断开"></div>
        <button id="menu-btn" class="mc-iconbtn" type="button" aria-label="菜单">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <path d="M4 7h16" />
            <path d="M4 12h16" />
            <path d="M4 17h16" />
          </svg>
        </button>
      </div>
    </header>

    <div id="mc-menu" class="mc-menu hidden" role="menu" aria-label="菜单">
      <button id="menu-open-prompts" class="mc-menu-item" type="button" role="menuitem">提示词</button>
      <button id="menu-open-settings" class="mc-menu-item" type="button" role="menuitem">设置</button>
    </div>

    <main class="mc-main">
      <section id="home" class="mc-home">
        <div class="mc-hero">
          <div class="mc-hero-menu">
            <button class="mc-iconbtn" type="button" aria-label="更多">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <path d="M4 8h16" />
                <path d="M4 16h16" />
              </svg>
            </button>
          </div>
          <h1 class="mc-hero-title">你好，</h1>
          <p class="mc-hero-subtitle">我今天能帮你什么？</p>
          <div class="mc-hero-pills" role="list">
            <button class="mc-pill" type="button" data-fill="input" data-text="总结当前网页" role="listitem">总结网页</button>
            <button class="mc-pill" type="button" data-fill="input" data-text="提取要点并生成TODO"
              role="listitem">提取要点</button>
            <button class="mc-pill" type="button" data-fill="input" data-text="把下面内容改写成更专业的邮件"
              role="listitem">写邮件</button>
            <button class="mc-pill" type="button" data-fill="input" data-text="Deep Research：围绕这个主题做深入调研"
              role="listitem">Deep Research</button>
          </div>
          <button class="mc-onboarding" type="button">
            <span class="mc-onboarding-icon">🌿</span>
            新手指南
            <span class="mc-onboarding-arrow">→</span>
          </button>
        </div>

        <div id="tip-banner" class="mc-tip" role="note">
          <div class="mc-tip-icon">💡</div>
          <div class="mc-tip-text">
            每次打开 MicroClaw 时，都会开始一个新的聊天。要继续上次的聊天，请调整
            <button id="tip-settings-link" class="mc-link" type="button">设置</button>。
          </div>
          <button id="tip-close" class="mc-tip-close" type="button" aria-label="关闭">×</button>
        </div>
      </section>

      <section class="mc-chat" id="chat-container" aria-label="对话内容"></section>
    </main>

    <footer class="mc-composer" aria-label="消息输入">
      <div class="mc-toolbar">
        <button id="model-btn" class="mc-modelpill" type="button">
          <span class="mc-modelpill-icon">⚡</span>
          <span id="current-model-name">MicroClaw</span>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <path d="M6 9l6 6 6-6" />
          </svg>
        </button>

        <!-- Model Selection Menu -->
        <div id="model-menu" class="mc-menu hidden"
          style="bottom: 70px; left: 14px; top: auto; right: auto; width: 220px;">
          <!-- Agents injected here -->
        </div>

        <div class="mc-toolicons" role="group" aria-label="快捷操作">
          <button class="mc-toolicon" id="add-url-btn" type="button" aria-label="添加当前网页" data-tooltip="添加当前网页信息">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
            </svg>
          </button>
          <button class="mc-toolicon" id="attach-btn" type="button" aria-label="添加附件" data-tooltip="添加附件">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
            </svg>
          </button>
          <button class="mc-toolicon" id="prompts-btn" type="button" aria-label="提示词" data-tooltip="提示词管理">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <path d="M14 2v6h6" />
              <path d="M16 13H8" />
              <path d="M16 17H8" />
            </svg>
          </button>
          <button class="mc-toolicon" id="settings-btn" type="button" aria-label="设置" data-tooltip="设置">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 4h-7" />
              <path d="M10 4H3" />
              <path d="M21 12h-9" />
              <path d="M8 12H3" />
              <path d="M21 20h-5" />
              <path d="M12 20H3" />
              <path d="M14 2v4" />
              <path d="M10 10v4" />
              <path d="M16 18v4" />
            </svg>
          </button>
        </div>

        <input type="file" id="file-input" style="display: none" />
      </div>

      <div class="mc-inputcard">
        <textarea id="user-input" class="mc-textarea" placeholder="问任何问题, /提示词 快速检索已保存提示词" rows="1"></textarea>
        <button id="send-btn" class="mc-send" type="button" disabled aria-label="发送">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
          </svg>
        </button>
      </div>
    </footer>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Agent 设置</h3>
          <button id="close-settings" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="settings-section"
            style="margin-bottom: 8px; padding-bottom: 12px; border-bottom: 1px solid var(--mc-border);">
            <h4 style="margin: 0 0 10px 0; font-size: 14px; color: var(--mc-text);">通用设置</h4>
            <div class="field-group"
              style="margin-bottom: 0; flex-direction: row; align-items: center; justify-content: space-between;">
              <label class="field-label" style="font-size: 13px; color: var(--mc-text); font-weight: 500;">启用划线弹出提示框
                (Ask ChatClaw)</label>
              <label class="mc-switch">
                <input type="checkbox" id="setting-enable-float-btn">
                <span class="mc-slider"></span>
              </label>
            </div>
          </div>

          <div class="settings-section">
            <h4 style="margin: 0 0 12px 0; font-size: 14px; color: var(--mc-text);">Agent 配置</h4>
            <div id="agent-list" class="agent-list-container">
              <!-- Agent cards injected here -->
            </div>

            <button id="add-agent-btn" class="add-agent-btn" title="添加新 Agent" style="margin-top: 16px;">
              +
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Prompts Modal (Redesigned) -->
    <div id="prompts-modal" class="modal hidden">
      <div class="modal-content modal-large">
        <div class="modal-header">
          <h3>提示词管理</h3>
          <button id="close-prompts" class="close-btn">&times;</button>
        </div>
        <div class="modal-body prompts-layout">
          <!-- List View -->
          <div id="prompts-list-view" class="prompts-sidebar full-width">
            <div class="prompts-toolbar">
              <input type="text" id="prompt-search" class="search-input" placeholder="搜索提示词...">
              <button id="create-prompt-btn" class="btn-primary-small">+ 新建</button>
            </div>
            <div id="prompts-list" class="prompts-list-container">
              <!-- Prompts injected here -->
            </div>
          </div>

          <!-- Editor View (Overlay) -->
          <div id="prompt-editor" class="prompt-editor full-width hidden">
            <div class="editor-header">
              <button id="back-to-list-btn" class="icon-btn-small" title="返回">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 12H5" />
                  <path d="M12 19l-7-7 7-7" />
                </svg>
              </button>
              <h4 id="editor-title">新建提示词</h4>
            </div>
            <div class="editor-body">
              <div class="form-group">
                <label>提示名称 <span class="required">*</span></label>
                <input type="text" id="edit-prompt-name" class="form-input" placeholder="为您的提示命名">
              </div>

              <div class="form-group">
                <label>图标</label>
                <div class="icon-selector">
                  <span id="edit-prompt-icon-display" class="current-icon">💡</span>
                  <button id="change-icon-btn" class="btn-secondary-small">更改</button>
                  <!-- Emoji Picker Dropdown -->
                  <div id="emoji-picker" class="emoji-picker hidden">
                    <input type="text" id="emoji-search" placeholder="搜索图标..." class="emoji-search">
                    <div id="emoji-grid" class="emoji-grid">
                      <!-- Emojis injected here -->
                    </div>
                  </div>
                </div>
              </div>

              <div class="form-group flex-grow">
                <label>提示内容 <span class="required">*</span></label>
                <textarea id="edit-prompt-content" class="form-textarea" placeholder="在此处粘贴或输入内容"></textarea>
              </div>

              <div class="editor-actions">
                <button id="cancel-prompt-btn" class="btn-secondary">取消</button>
                <button id="save-prompt-btn" class="btn-primary">保存</button>
              </div>
            </div>
          </div>

          <!-- Removed Empty State -->
        </div>
      </div>
    </div>

    <!-- Slash Command Popup -->
    <div id="slash-popup" class="slash-popup hidden">
      <!-- Matches injected here -->
    </div>
  </div>
  <script src="marked.min.js"></script>
  <script src="sidebar.js"></script>
</body>

</html>
