<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MicroClaw Sidebar</title>
  <link rel="stylesheet" href="sidebar.css">
</head>

<body>
  <div class="mc-shell">
    <header class="mc-topbar">
      <div class="mc-brand" role="banner">
        <img class="mc-brand-icon" src="icons/chatclaw-icon.png" alt="ChatClaw" width="24" height="24" />
        <div class="mc-brand-text">
          <div class="mc-brand-title">ChatClaw</div>
        </div>
      </div>
      <div class="mc-topbar-actions">
        <div id="connection-status" class="mc-status-dot disconnected" title="连接断开"></div>
        <button id="sessions-btn" class="mc-iconbtn" aria-label="历史会话" title="历史会话" data-tooltip="历史会话">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
    </header>

    <main class="mc-main">
      <section id="home" class="mc-home">
        <div class="mc-hero">
          <div class="mc-hero-menu">
            <button class="mc-iconbtn" type="button" aria-label="更多">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <path d="M4 8h16" />
                <path d="M4 16h16" />
              </svg>
            </button>
          </div>
          <h1 class="mc-hero-title">你好，</h1>
          <p class="mc-hero-subtitle">我今天能帮你什么？</p>
          <div class="mc-hero-pills" role="list">
            <button class="mc-pill" type="button" data-fill="input" data-text="请根据 OmniTag 技能的标签规则，为当前网页/划线内容推荐合适的分类标签。"
              role="listitem">标签推荐</button>
            <button class="mc-pill" type="button" data-fill="input" data-text="请阅读当前网页内容，提取核心观点，并生成结构化的思维导图大纲。"
              role="listitem">网页总结</button>
            <button class="mc-pill" type="button" data-fill="input"
              data-text="将当前网页或划线内容解析为 Markdown 格式，提取摘要和关键元数据，准备入库。" role="listitem">入库整理</button>
            <button class="mc-pill" type="button" data-fill="input" data-text="基于当前网页的上下文，帮我深入调研相关背景信息，并提供一份综合的分析简报。"
              role="listitem">深度调研</button>
          </div>
          <a class="mc-onboarding"
            href="https://github.com/flyflypeng/chatclaw?tab=readme-ov-file#-%E4%BD%BF%E7%94%A8%E6%8C%87%E5%8D%97"
            target="_blank" rel="noopener noreferrer">
            <span class="mc-onboarding-icon">🌿</span>
            新手指南
            <span class="mc-onboarding-arrow">→</span>
          </a>
        </div>

        <div id="tip-banner" class="mc-tip" role="note">
          <div class="mc-tip-icon">💡</div>
          <div class="mc-tip-text">
            每次打开 ChatClaw 时，默认复用上次的聊天会话。要新创建聊天会话，请点击下方 ➕ 按钮
          </div>
          <button id="tip-close" class="mc-tip-close" type="button" aria-label="关闭">×</button>
        </div>
      </section>

      <section class="mc-chat" id="chat-container" aria-label="对话内容"></section>
    </main>

    <footer class="mc-composer" aria-label="消息输入">
      <div class="mc-composer-inner">
        <!-- Model Selection Menu -->
        <div id="model-menu" class="mc-menu hidden"
          style="bottom: 100%; left: 0; margin-bottom: 8px; top: auto; right: auto; width: 220px;">
          <!-- Agents injected here -->
        </div>

        <div class="mc-composer-top">
          <div class="mc-composer-actions">
            <button id="model-btn" class="mc-modelpill" type="button">
              <span class="mc-modelpill-icon">⚡</span>
              <span id="current-model-name">MicroClaw</span>
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <path d="M6 9l6 6 6-6" />
              </svg>
            </button>
            <button class="mc-modelpill mc-new-session" id="new-session-btn" type="button" aria-label="新建会话"
              title="新建会话">
              <span class="mc-modelpill-icon">✨</span>
              <span>新建会话</span>
            </button>
          </div>
        </div>

        <textarea id="user-input" class="mc-textarea" placeholder="问任何问题, /提示词 快速检索已保存提示词" rows="1"></textarea>

        <div class="mc-composer-bottom">
          <div class="mc-toolicons" role="group" aria-label="快捷操作">
            <button class="mc-toolicon" id="add-url-btn" type="button" aria-label="添加当前网页" data-tooltip="添加当前网页信息">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
              </svg>
            </button>
            <button class="mc-toolicon" id="attach-btn" type="button" aria-label="添加附件" data-tooltip="添加附件">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
              </svg>
            </button>
            <button class="mc-toolicon" id="prompts-btn" type="button" aria-label="提示词" data-tooltip="提示词管理">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <path d="M14 2v6h6" />
                <path d="M16 13H8" />
                <path d="M16 17H8" />
              </svg>
            </button>
            <button class="mc-toolicon" id="settings-btn" type="button" aria-label="设置" data-tooltip="设置">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 4h-7" />
                <path d="M10 4H3" />
                <path d="M21 12h-9" />
                <path d="M8 12H3" />
                <path d="M21 20h-5" />
                <path d="M12 20H3" />
                <path d="M14 2v4" />
                <path d="M10 10v4" />
                <path d="M16 18v4" />
              </svg>
            </button>
            <a class="mc-toolicon" href="https://github.com/flyflypeng/chatclaw#readme" target="_blank"
              aria-label="帮助文档" data-tooltip="查看帮助文档">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
              </svg>
            </a>
          </div>

          <div class="mc-send-group">
            <span class="mc-shortcut-hint">↵ 发送</span>
            <button id="send-btn" class="mc-send" type="button" disabled aria-label="发送">
              <svg class="mc-send-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
              </svg>
              <svg class="mc-stop-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="display:none;">
                <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
                <rect x="8" y="8" width="8" height="8" rx="1.5"/>
              </svg>
            </button>
          </div>
        </div>

        <input type="file" id="file-input" style="display: none" />
      </div>
    </footer>

    <!-- Sessions Modal -->
    <div id="sessions-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>历史会话</h3>
          <button id="close-sessions" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div id="sessions-list" class="sessions-list-container">
            <!-- Sessions injected here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Confirm Dialog Modal -->
    <div id="confirm-modal" class="modal hidden" style="z-index: 200;">
      <div class="modal-content" style="max-width: 280px;">
        <div class="modal-header">
          <h3 id="confirm-title">提示</h3>
          <button id="close-confirm" class="close-btn">&times;</button>
        </div>
        <div class="modal-body dialog-body">
          <p id="confirm-message" class="dialog-message">确认执行此操作吗？</p>
          <div class="dialog-actions">
            <button id="confirm-cancel-btn" class="btn-action btn-save btn-dialog">取消</button>
            <button id="confirm-ok-btn" class="btn-action btn-danger btn-dialog">确定</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Alert Dialog Modal -->
    <div id="alert-modal" class="modal hidden" style="z-index: 200;">
      <div class="modal-content" style="max-width: 280px;">
        <div class="modal-header">
          <h3 id="alert-title">提示</h3>
          <button id="close-alert" class="close-btn">&times;</button>
        </div>
        <div class="modal-body dialog-body">
          <p id="alert-message" class="dialog-message">操作失败</p>
          <div class="dialog-actions">
            <button id="alert-ok-btn" class="btn-action btn-primary btn-dialog">确定</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Agent 设置</h3>
          <button id="close-settings" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="settings-section has-divider">
            <h4>通用设置</h4>
            <div class="field-group toggle-group">
              <label class="field-label">启用划线弹出提示框 (Ask ChatClaw)</label>
              <label class="mc-switch">
                <input type="checkbox" id="setting-enable-float-btn">
                <span class="mc-slider"></span>
              </label>
            </div>
          </div>

          <div class="settings-section">
            <h4>Agent 配置</h4>
            <div id="agent-list" class="agent-list-container">
              <!-- Agent cards injected here -->
            </div>

            <button id="add-agent-btn" class="add-agent-btn" title="添加新 Agent">
              +
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Prompts Modal (Redesigned) -->
    <div id="prompts-modal" class="modal hidden">
      <div class="modal-content modal-large">
        <div class="modal-header">
          <h3>提示词管理</h3>
          <button id="close-prompts" class="close-btn">&times;</button>
        </div>
        <div class="modal-body prompts-layout">
          <!-- List View -->
          <div id="prompts-list-view" class="prompts-sidebar full-width">
            <div class="prompts-toolbar">
              <input type="text" id="prompt-search" class="search-input" placeholder="搜索提示词...">
              <button id="create-prompt-btn" class="btn-primary-small">+ 新建</button>
            </div>
            <div id="prompts-list" class="prompts-list-container">
              <!-- Prompts injected here -->
            </div>
          </div>

          <!-- Editor View (Overlay) -->
          <div id="prompt-editor" class="prompt-editor full-width hidden">
            <div class="editor-header">
              <button id="back-to-list-btn" class="icon-btn-small" title="返回">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 12H5" />
                  <path d="M12 19l-7-7 7-7" />
                </svg>
              </button>
              <h4 id="editor-title">新建提示词</h4>
            </div>
            <div class="editor-body">
              <div class="form-group">
                <label>提示名称 <span class="required">*</span></label>
                <input type="text" id="edit-prompt-name" class="form-input" placeholder="为您的提示命名">
              </div>

              <div class="form-group">
                <label>图标</label>
                <div class="icon-selector">
                  <span id="edit-prompt-icon-display" class="current-icon">💡</span>
                  <button id="change-icon-btn" class="btn-secondary-small">更改</button>
                  <!-- Emoji Picker Dropdown -->
                  <div id="emoji-picker" class="emoji-picker hidden">
                    <input type="text" id="emoji-search" placeholder="搜索图标..." class="emoji-search">
                    <div id="emoji-grid" class="emoji-grid">
                      <!-- Emojis injected here -->
                    </div>
                  </div>
                </div>
              </div>

              <div class="form-group flex-grow">
                <label>提示内容 <span class="required">*</span></label>
                <textarea id="edit-prompt-content" class="form-textarea" placeholder="在此处粘贴或输入内容"></textarea>
              </div>

              <div class="editor-actions">
                <button id="cancel-prompt-btn" class="btn-secondary">取消</button>
                <button id="save-prompt-btn" class="btn-primary">保存</button>
              </div>
            </div>
          </div>

          <!-- Removed Empty State -->
        </div>
      </div>
    </div>

    <!-- Slash Command Popup -->
    <div id="slash-popup" class="slash-popup hidden">
      <!-- Matches injected here -->
    </div>
  </div>
  <script type="module" src="./sidebar.js"></script>
</body>

</html>
